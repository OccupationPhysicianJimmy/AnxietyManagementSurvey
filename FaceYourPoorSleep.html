<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>反直覺失眠問卷</title>
<style>
body {
    font-family: "Segoe UI", Arial;
    background: #f2f4f7;
    padding: 20px;
}
.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
h1 {
    text-align: center;
}
.progress {
    background: #ddd;
    border-radius: 10px;
    margin-bottom: 20px;
}
.progress-bar {
    height: 12px;
    width: 0%;
    background: #6c8cff;
    border-radius: 10px;
}
.question {
    margin-bottom: 20px;
}
.feedback {
    font-size: 14px;
    color: #666;
    margin-top: 5px;
}
button {
    padding: 10px 20px;
    background: #6c8cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
.result {
    display: none;
    margin-top: 20px;
    padding: 15px;
    background: #eef2ff;
    border-radius: 8px;
}
</style>
</head>

<body>
<div class="container">
<h1>🌙 你不是睡不著，是「太努力想睡」</h1>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<form id="quiz">

<div class="question">
<p>1️⃣ 躺在床上睡不著時，你會：</p>
<label><input type="radio" name="q1" value="A"> 努力讓自己快點睡</label><br>
<label><input type="radio" name="q1" value="B"> 滑手機分散注意</label><br>
<label><input type="radio" name="q1" value="C"> 想事情讓自己累</label><br>
<label><input type="radio" name="q1" value="D"> 起床離開床</label>
<div class="feedback" id="f1"></div>
</div>

<div class="question">
<p>2️⃣ 你看時間的頻率：</p>
<label><input type="radio" name="q2" value="A"> 一直看</label><br>
<label><input type="radio" name="q2" value="B"> 偶爾看</label><br>
<label><input type="radio" name="q2" value="C"> 幾乎不看</label><br>
<label><input type="radio" name="q2" value="D"> 刻意避免看</label>
<div class="feedback" id="f2"></div>
</div>

<div class="question">
<p>3️⃣ 明天有重要事情時，你今晚會：</p>
<label><input type="radio" name="q3" value="A"> 更努力讓自己睡</label><br>
<label><input type="radio" name="q3" value="B"> 提早躺床</label><br>
<label><input type="radio" name="q3" value="C"> 放鬆但仍有壓力</label><br>
<label><input type="radio" name="q3" value="D"> 接受可能睡不好</label>
<div class="feedback" id="f3"></div>
</div>

<div class="question">
<p>4️⃣ 睡不好隔天你會：</p>
<label><input type="radio" name="q4" value="A"> 很焦慮</label><br>
<label><input type="radio" name="q4" value="B"> 想補眠</label><br>
<label><input type="radio" name="q4" value="C"> 撐過去</label><br>
<label><input type="radio" name="q4" value="D"> 正常作息不補眠</label>
<div class="feedback" id="f4"></div>
</div>

<div class="question">
<p>5️⃣ 你對睡眠的想法比較接近：</p>
<label><input type="radio" name="q5" value="A"> 一定要睡滿才行</label><br>
<label><input type="radio" name="q5" value="B"> 睡不好會很糟</label><br>
<label><input type="radio" name="q5" value="C"> 有影響但還好</label><br>
<label><input type="radio" name="q5" value="D"> 身體會自己調整</label>
<div class="feedback" id="f5"></div>
</div>

<button type="button" onclick="result()">看結果</button>

</form>

<div class="result" id="result"></div>

</div>

<script>
const fb = {
A:"👉 越努力想睡，通常越清醒",
B:"👉 分散注意有效，但可能變成依賴",
C:"👉 還在用「控制睡眠」的方式",
D:"👉 這其實是臨床上有效策略（降低壓力）"
};

const inputs = document.querySelectorAll("input");
const total = 5;

inputs.forEach(i=>{
 i.addEventListener("change", ()=>{
  let done = document.querySelectorAll("input:checked").length;
  document.getElementById("bar").style.width = (done/total*100)+"%";
  
  let q = i.name.replace("q","");
  document.getElementById("f"+q).innerText = fb[i.value];
 });
});

function result(){
 let checked = document.querySelectorAll("input:checked");
 if(checked.length<total){alert("請完成全部題目");return;}
 
 let count={A:0,B:0,C:0,D:0};
 checked.forEach(c=>count[c.value]++);
 
 let text="";
 if(count.A>=3){
  text="⚠️ 你屬於「過度努力型失眠」：越想控制睡眠，反而越清醒";
 }else if(count.B>=3){
  text="📱 你屬於「分散逃避型」：短期有效，但長期可能惡化";
 }else if(count.C>=3){
  text="🤯 你屬於「認知負荷型」：腦袋停不下來是關鍵";
 }else{
  text="🌙 你已接近「自然睡眠型」：重點是維持穩定節律";
 }
 
 document.getElementById("result").style.display="block";
 document.getElementById("result").innerHTML="<b>結果：</b><br>"+text+
 "<br><br>👉 真正的問題不是你睡不著，而是你『如何對待睡不著』";
}
</script>

</body>
</html>
